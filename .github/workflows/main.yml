name: Continuous Integration and Delivery

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/kapitanmixu/test-driven_fastapi_docker/summarizer

jobs:

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image (with cache)
        run: |
          docker build \
            --file ./project/Dockerfile.prod \
            --tag ${{ env.IMAGE }}:latest \
            ./project

      - name: Run container
        run: |
          docker run -d \
            --name app \
            -e PORT=8765 \
            -e ENVIRONMENT=dev \
            -e DATABASE_URL=sqlite://sqlite.db \
            -e DATABASE_TEST_URL=sqlite://sqlite.db \
            -p 5003:8765 \
            ${{ env.IMAGE }}:latest

      - name: Pytest
        run: docker exec app python -m pytest

      - name: Flake8
        run: docker exec app python -m flake8 .

      - name: Black
        run: docker exec app python -m black . --check

      - name: isort
        run: docker exec app python -m isort . --check-only

      - name: Push image
        run: |
          docker push ${{ env.IMAGE }}:latest


  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        run: curl -L https://fly.io/install.sh | sh

      - name: Add flyctl to PATH
        run: echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Debug token (length only)
        run: echo "${#FLY_API_TOKEN}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}